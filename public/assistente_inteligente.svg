<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Dois mockups esqueleto de assistente inteligente</title>
<desc>Dois quadrados representando miniaturas de interface de chat com IA: um em tons de azul claro, outro em tons de roxo escuro, cada um mostrando cabecalho do assistente, bolhas de conversa e campo de entrada.</desc>

